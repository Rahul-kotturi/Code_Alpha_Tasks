<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Store</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    
    <header>
        <h1><a href="/">E-Store</a></h1>
        
        <form class="search-container" onsubmit="handleSearch(event)">
            <input type="text" id="search-input" placeholder="Search for standard products...">
            <button type="submit">Search</button>
        </form>

        <nav class="nav-actions" id="nav-actions-container">
            </nav>
    </header>

    <main class="container">
        <section class="products-section">
            <h2>Featured Catalog Items</h2>
            <div id="product-grid" class="grid"></div>
        </section>
    </main>

    <script src="/js/main.js"></script>
</body>
</html>
