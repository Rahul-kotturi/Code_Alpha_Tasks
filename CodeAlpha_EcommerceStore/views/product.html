<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <h1><a href="/">E-Store</a></h1>
    </header>
    
    <main class="center-container">
        <div id="product-details" class="details-card">
            </div>
    </main>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');

        fetch(`/api/products/${productId}`)
            .then(res => res.json())
            .then(product => {
                const detailsDiv = document.getElementById('product-details');
                detailsDiv.innerHTML = `
                    <div class="details-image">
                        <img src="${product.image_url}" alt="${product.name}">
                    </div>
                    <div class="details-info">
                        <h2>${product.name}</h2>
                        <p class="price">$${product.price.toFixed(2)}</p>
                        <p style="line-height:1.6; color:#555; margin-bottom:2rem;">${product.description}</p>
                        <button onclick="addToCartDirect(${product.id}, '${product.name}', ${product.price})" style="background-color:#007bff; font-size:1rem; padding:0.8rem 1.5rem;">Add to Cart</button>
                    </div>
                `;
            });

        function addToCartDirect(id, name, price) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            const existing = cart.find(item => item.id === id);
            if (existing) existing.quantity++;
            else cart.push({ id, name, price, quantity: 1 });
            localStorage.setItem('cart', JSON.stringify(cart));
            
            // Redirect back to home window view state and pop drawer open
            window.location.href = '/';
        }
    </script>
</body>
</html>
