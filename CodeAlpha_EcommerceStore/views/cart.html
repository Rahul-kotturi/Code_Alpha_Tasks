<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Shopping Cart</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <h1><a href="/">E-Store</a></h1>
        <nav class="nav-actions" id="nav-actions-container"></nav>
    </header>

    <main class="container page-cart-container">
        <h2>🛍️ Your Shopping Cart Inventory</h2>
        <hr style="border: 0; border-top: 1px solid #ddd; margin-bottom: 2rem;">
        
        <div class="cart-layout-wrapper">
            <div id="cart-page-items" class="cart-items-list-pane"></div>
            
            <div class="cart-summary-panel">
                <h3>Order Summary</h3>
                <p style="display:flex; justify-content:space-between; margin: 1.5rem 0;">
                    <span>Subtotal Total:</span>
                    <strong>$<span id="cart-total">0.00</span></strong>
                </p>
                <p style="font-size:0.85rem; color:#666; margin-bottom:1.5rem;">Shipping and taxes calculated at checkout steps.</p>
                <button onclick="checkout()" style="background-color:#28a745; width:100%; padding: 0.8rem; font-size:1.05rem;">Proceed To Confrim Order </button>
                <br><br>
                <a href="/" style="display:block; text-align:center; color:#007bff; text-decoration:none; font-size:0.9rem;">← Continue Shopping</a>
            </div>
        </div>
    </main>

    <script src="/js/main.js"></script>
    <script>
        // Trigger specific cart initialization when this isolated viewport context mounts
        document.addEventListener("DOMContentLoaded", () => {
            updateCartPageUI();
        });
    </script>
</body>
</html>
