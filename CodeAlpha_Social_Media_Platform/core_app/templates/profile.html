{% extends 'base.html' %}
{% block content %}
<div class="card" style="text-align: center; background: linear-gradient(to bottom, var(--primary-color) 120px, var(--card-bg) 120px); border-top: none; padding-top: 40px;">
    <div style="width: 100px; height: 100px; background: #222227; color: var(--primary-color); border-radius: 50%; border: 4px solid var(--border-color); margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 44px; box-shadow: 0 4px 10px rgba(0,0,0,0.3);">👤</div>
    <h2 style="margin: 10px 0 5px 0; color: #ffffff;">@{{ profile_user.username }}</h2>
    <p style="color: var(--text-sub); margin: 0 0 15px 0; font-size: 14px; font-weight: 500;">Official Contributor Profile</p>
    
    <div style="display: flex; justify-content: center; gap: 40px; margin-top: 20px; border-top: 1px solid var(--border-color); padding-top: 20px;">
        <div><strong style="font-size: 18px; color: var(--primary-color);">{{ post_count }}</strong> <span style="display: block; font-size: 12px; color: var(--text-sub); font-weight: 600;">POSTS</span></div>
        <div><strong style="font-size: 18px; color: var(--primary-color);">142</strong> <span style="display: block; font-size: 12px; color: var(--text-sub); font-weight: 600;">FOLLOWERS</span></div>
        <div><strong style="font-size: 18px; color: var(--primary-color);">98</strong> <span style="display: block; font-size: 12px; color: var(--text-sub); font-weight: 600;">FOLLOWING</span></div>
    </div>
</div>

<h3 style="color: #ffffff; margin-top: 30px; margin-bottom: 15px;">Recent Activity Logs</h3>
<div id="profile-posts-container"></div>

<script>
    async function loadProfilePosts() {
        const response = await fetch('/api/posts/');
        const data = await response.json();
        const container = document.getElementById('profile-posts-container');
        container.innerHTML = '';

        const targetProfileUser = "{{ profile_user.username }}";
        let matchFound = false;

        data.posts.forEach(post => {
            if (post.username === targetProfileUser) {
                matchFound = true;
                container.innerHTML += `
                    <div class="card">
                        <div style="display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 8px;">
                            <span style="color: var(--primary-color);">@${post.username}</span>
                            <span style="font-size: 12px; color: var(--text-sub); font-weight: normal;">${post.created_at}</span>
                        </div>
                        <div style="font-size: 15px; color: #ffffff; line-height: 1.5; margin: 10px 0;">${post.content}</div>
                        <div style="border-top: 1px solid var(--border-color); padding-top: 8px; font-size: 13px; color: var(--text-sub); font-weight: 500;">
                            👍 Received ${post.likes_count} Likes
                        </div>
                    </div>`;
            }
        });

        if (!matchFound) {
            container.innerHTML = `<div class="card" style="text-align: center; color: var(--text-sub);">This user hasn't published any updates yet.</div>`;
        }
    }

    loadProfilePosts();
</script>
{% endblock %}
